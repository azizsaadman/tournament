<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-pink-50 text-gray-900">
    <div id="app" class="min-h-screen">
        <div class="flex flex-col items-center justify-center min-h-screen">
            <div class="text-6xl mb-4">🎯</div>
            <p class="text-2xl font-bold text-brand">Loading Tournament Manager...</p>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCupK0XQYDdQB5-C-NqPaI2B6hSd3Twh6I",
            authDomain: "tournament-f7277.firebaseapp.com",
            databaseURL: "https://tournament-f7277-default-rtdb.firebaseio.com",
            projectId: "tournament-f7277",
            storageBucket: "tournament-f7277.firebasestorage.app",
            messagingSenderId: "822786718406",
            appId: "1:822786718406:web:2ba6db5d8a73236a74f5c7"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Main App
        function initApp() {
            const app = document.getElementById('app');
            const isHost = new URLSearchParams(window.location.search).get('host') === 'secret';

            app.innerHTML = `
                <div class="min-h-screen bg-pink-50">
                    <!-- Header -->
                    <header class="bg-white border-b border-pink-200 sticky top-0 z-50">
                        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                            <h1 class="text-3xl font-black text-pink-600">🎯 Tournament Manager</h1>
                            ${isHost ? `<button onclick="toggleHost()" class="px-4 py-2 bg-pink-600 text-white rounded-lg font-bold">⚙️ Host Panel</button>` : ''}
                        </div>
                    </header>

                    <!-- Sport Tabs -->
                    <div class="bg-white border-b border-pink-200 sticky top-16 z-40">
                        <div class="max-w-7xl mx-auto px-4 py-3">
                            <div class="flex gap-2 overflow-x-auto pb-2">
                                <button onclick="selectSport('football')" class="sport-btn active px-4 py-2 rounded-full bg-pink-600 text-white font-bold whitespace-nowrap">⚽ Football</button>
                                <button onclick="selectSport('cricket')" class="sport-btn px-4 py-2 rounded-full bg-pink-100 text-gray-700 font-bold whitespace-nowrap">🏏 Cricket</button>
                                <button onclick="selectSport('badminton')" class="sport-btn px-4 py-2 rounded-full bg-pink-100 text-gray-700 font-bold whitespace-nowrap">🏸 Badminton</button>
                                <button onclick="selectSport('basketball')" class="sport-btn px-4 py-2 rounded-full bg-pink-100 text-gray-700 font-bold whitespace-nowrap">🏀 Basketball</button>
                            </div>
                        </div>
                    </div>

                    <!-- Main Content -->
                    <div class="max-w-7xl mx-auto px-4 py-6">
                        <div id="content" class="space-y-4">
                            <div class="bg-white p-6 rounded-lg border border-pink-200 text-center">
                                <p class="text-gray-500 text-lg">No data yet. ${isHost ? 'Use the Host Panel to add tournaments!' : 'Check back soon!'}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Load data from Firebase
            db.ref('tournaments').on('value', (snapshot) => {
                if (snapshot.val()) {
                    console.log('✅ Firebase Connected! Data:', snapshot.val());
                } else {
                    console.log('📭 No data in Firebase yet');
                }
            });
        }

        function selectSport(sport) {
            document.querySelectorAll('.sport-btn').forEach(btn => {
                btn.classList.remove('bg-pink-600', 'text-white');
                btn.classList.add('bg-pink-100', 'text-gray-700');
            });
            event.target.classList.remove('bg-pink-100', 'text-gray-700');
            event.target.classList.add('bg-pink-600', 'text-white');
        }

        function toggleHost() {
            alert('Host panel coming soon!');
        }

        // Initialize when page loads
        window.addEventListener('load', initApp);
    </script>
</body>
</html>
