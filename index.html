<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        .sport-btn.active { @apply bg-pink-600 text-white; }
        .sport-btn:not(.active) { @apply bg-pink-100 text-gray-700; }
        .sub-btn.active { @apply bg-purple-600 text-white border-purple-600; }
        .sub-btn:not(.active) { @apply bg-white text-gray-600 border-gray-200 hover:bg-gray-50; }
    </style>
</head>
<body class="bg-pink-50 text-gray-900">
    <div id="app"></div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCupK0XQYDdQB5-C-NqPaI2B6hSd3Twh6I",
            authDomain: "tournament-f7277.firebaseapp.com",
            databaseURL: "https://tournament-f7277-default-rtdb.firebaseio.com",
            projectId: "tournament-f7277",
            storageBucket: "tournament-f7277.firebasestorage.app",
            messagingSenderId: "822786718406",
            appId: "1:822786718406:web:2ba6db5d8a73236a74f5c7"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Application State
        let state = {
            activeSport: 'football',
            activeSubGroup: 'male',
            showHost: false,
            tournaments: {},
            isHost: new URLSearchParams(window.location.search).get('host') === 'secret'
        };

        const SPORTS = {
            football: { name: 'Football', icon: '⚽' },
            cricket: { name: 'Cricket', icon: '🏏' },
            badminton: { name: 'Badminton', icon: '🏸' }
        };

        const SUBGROUPS = {
            male: { name: 'Male', icon: '👨' },
            female: { name: 'Female', icon: '👩' }
        };

        // Firebase listeners
        db.ref('tournaments').on('value', (snapshot) => {
            state.tournaments = snapshot.val() || {};
            render();
        });

        // Global UI Functions
        window.selectSport = (sport) => { state.activeSport = sport; render(); };
        window.selectSubGroup = (sub) => { state.activeSubGroup = sub; render(); };
        window.toggleHost = () => { state.showHost = !state.showHost; render(); };

        // Database Functions
        window.addGroup = () => {
            const name = prompt('Group name (e.g., Group A):');
            if (name) {
                // FIXED: Firebase deletes empty objects. We must add a placeholder value like timestamp.
                db.ref(`tournaments/${state.activeSport}/${state.activeSubGroup}/groups/${name}`).set({
                    createdAt: Date.now(),
                    name: name
                });
            }
        };

        window.addTeam = (groupName) => {
            const teamName = prompt('Team name:');
            if (!teamName) return;
            const teamId = Date.now();
            db.ref(`tournaments/${state.activeSport}/${state.activeSubGroup}/groups/${groupName}/teams/${teamId}`).set({
                id: teamId,
                name: teamName,
                logo: '⚽'
            });
        };

        window.addMatch = (groupName) => {
            const teamA = prompt('Team A name:'); if (!teamA) return;
            const teamB = prompt('Team B name:'); if (!teamB) return;
            const date = prompt('Date (e.g., 2024-05-15):');
            const time = prompt('Time (e.g., 3:00 PM):');
            const venue = prompt('Venue:');

            const matchId = Date.now();
            db.ref(`tournaments/${state.activeSport}/${state.activeSubGroup}/groups/${groupName}/matches/${matchId}`).set({
                id: matchId,
                teamA,
                teamB,
                scoreA: 0,
                scoreB: 0,
                status: 'upcoming',
                date,
                time,
                venue
            });
        };

        window.updateScore = (groupName, matchId, team, value) => {
            const field = team === 'A' ? 'scoreA' : 'scoreB';
            db.ref(`tournaments/${state.activeSport}/${state.activeSubGroup}/groups/${groupName}/matches/${matchId}/${field}`).set(parseInt(value) || 0);
        };

        window.updateStatus = (groupName, matchId, status) => {
            db.ref(`tournaments/${state.activeSport}/${state.activeSubGroup}/groups/${groupName}/matches/${matchId}/status`).set(status);
        };

        window.removeMatch = (groupName, matchId) => {
            if (confirm('Delete this match?')) {
                db.ref(`tournaments/${state.activeSport}/${state.activeSubGroup}/groups/${groupName}/matches/${matchId}`).remove();
            }
        };

        window.removeGroup = (groupName) => {
            if (confirm('Delete this entire group?')) {
                db.ref(`tournaments/${state.activeSport}/${state.activeSubGroup}/groups/${groupName}`).remove();
            }
        };

        window.addTickerItem = () => {
            const text = prompt('Enter headline:');
            if (text) db.ref(`ticker/${Date.now()}`).set(text);
        };

        // Render Function
        function render() {
            const app = document.getElementById('app');
            
            // Get data for the currently selected sport AND subgroup
            const sportData = state.tournaments[state.activeSport] || {};
            const subGroupData = sportData[state.activeSubGroup] || {};
            const groups = subGroupData.groups || {};

            app.innerHTML = `
                <div class="min-h-screen bg-pink-50">
                    <header class="bg-white border-b border-pink-200 sticky top-0 z-50">
                        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                            <h1 class="text-3xl font-black text-pink-600">🎯 Tournament Live</h1>
                            ${state.isHost ? `<button onclick="toggleHost()" class="px-4 py-2 bg-pink-600 text-white rounded-lg font-bold shadow-md">${state.showHost ? '✕ Close Panel' : '⚙️ Host Panel'}</button>` : ''}
                        </div>
                    </header>

                    <div class="bg-white border-b border-pink-200 sticky top-[72px] z-40 shadow-sm">
                        
                        <div class="max-w-7xl mx-auto px-4 pt-3 pb-2 border-b border-gray-100">
                            <div class="flex gap-2 overflow-x-auto hide-scrollbar">
                                ${Object.entries(SPORTS).map(([key, sport]) => `
                                    <button onclick="selectSport('${key}')" class="sport-btn ${state.activeSport === key ? 'active' : ''} px-5 py-2 rounded-full font-bold whitespace-nowrap text-sm transition">
                                        ${sport.icon} ${sport.name}
                                    </button>
                                `).join('')}
                            </div>
                        </div>

                        <div class="max-w-7xl mx-auto px-4 py-2">
                            <div class="flex gap-2">
                                ${Object.entries(SUBGROUPS).map(([key, sub]) => `
                                    <button onclick="selectSubGroup('${key}')" class="sub-btn border ${state.activeSubGroup === key ? 'active' : ''} px-4 py-1.5 rounded-lg font-bold whitespace-nowrap text-xs transition flex-1 sm:flex-none text-center">
                                        ${sub.icon} ${sub.name}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <div class="max-w-7xl mx-auto px-4 py-6">
                        ${state.showHost && state.isHost ? renderHostPanel(groups) : renderViewerPanel(groups)}
                    </div>
                </div>
            `;
        }

        function renderHostPanel(groups) {
            return `
                <div class="bg-white rounded-xl border-2 border-pink-200 p-6 shadow-lg">
                    <div class="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">
                        <h2 class="text-2xl font-bold text-pink-600">
                            ⚙️ Host Control: <span class="text-gray-800">${SPORTS[state.activeSport].name} (${SUBGROUPS[state.activeSubGroup].name})</span>
                        </h2>
                    </div>
                    
                    <button onclick="addGroup()" class="w-full py-3 bg-pink-600 text-white rounded-lg font-bold mb-6 hover:bg-pink-700 transition shadow-md">
                        + Create New Group
                    </button>

                    <div class="space-y-6">
                        ${Object.entries(groups).length === 0 ? `
                            <p class="text-center text-gray-400 py-12 bg-gray-50 rounded-lg border border-dashed border-gray-300">No groups in this category yet. Click above to start!</p>
                        ` : Object.entries(groups).map(([groupKey, group]) => `
                            <div class="bg-gray-50 p-5 rounded-xl border border-pink-200 shadow-sm">
                                <div class="flex justify-between items-center mb-4">
                                    <h3 class="text-xl font-black text-gray-800 uppercase tracking-wide">${groupKey}</h3>
                                    <button onclick="removeGroup('${groupKey}')" class="px-3 py-1.5 bg-red-100 text-red-600 hover:bg-red-200 rounded text-xs font-bold transition">Delete Group</button>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div class="bg-white p-4 rounded-lg border border-gray-200">
                                        <h4 class="font-bold text-sm text-gray-700 mb-3 border-b pb-2">Matches</h4>
                                        <button onclick="addMatch('${groupKey}')" class="w-full py-2 bg-pink-100 text-pink-700 hover:bg-pink-200 rounded text-sm font-bold mb-3 transition">
                                            + Add Match
                                        </button>
                                        <div class="space-y-2">
                                        ${group.matches && Object.entries(group.matches).length > 0 ? Object.entries(group.matches).map(([mId, match]) => `
                                            <div class="bg-gray-50 p-3 rounded border border-gray-200 text-xs">
                                                <div class="font-bold text-gray-800 mb-2">${match.teamA} vs ${match.teamB}</div>
                                                <div class="flex gap-2 items-center">
                                                    <input type="number" value="${match.scoreA}" onchange="updateScore('${groupKey}', '${mId}', 'A', this.value)" class="w-12 px-1 py-1 border border-gray-300 rounded text-center font-bold">
                                                    <span class="text-gray-400 font-bold">-</span>
                                                    <input type="number" value="${match.scoreB}" onchange="updateScore('${groupKey}', '${mId}', 'B', this.value)" class="w-12 px-1 py-1 border border-gray-300 rounded text-center font-bold">
                                                    <select onchange="updateStatus('${groupKey}', '${mId}', this.value)" class="flex-1 px-2 py-1 border border-gray-300 rounded text-xs bg-white font-semibold">
                                                        <option value="upcoming" ${match.status === 'upcoming' ? 'selected' : ''}>Upcoming</option>
                                                        <option value="live" ${match.status === 'live' ? 'selected' : ''}>Live</option>
                                                        <option value="finished" ${match.status === 'finished' ? 'selected' : ''}>Finished</option>
                                                    </select>
                                                    <button onclick="removeMatch('${groupKey}', '${mId}')" class="px-2 py-1 bg-red-100 text-red-600 hover:bg-red-200 rounded text-xs font-bold">✕</button>
                                                </div>
                                            </div>
                                        `).join('') : '<p class="text-gray-400 text-xs text-center py-2">No matches added</p>'}
                                        </div>
                                    </div>

                                    <div class="bg-white p-4 rounded-lg border border-gray-200">
                                        <h4 class="font-bold text-sm text-gray-700 mb-3 border-b pb-2">Teams</h4>
                                        <button onclick="addTeam('${groupKey}')" class="w-full py-2 bg-pink-100 text-pink-700 hover:bg-pink-200 rounded text-sm font-bold mb-3 transition">
                                            + Add Team
                                        </button>
                                        <div class="space-y-2">
                                        ${group.teams && Object.entries(group.teams).length > 0 ? Object.entries(group.teams).map(([tId, team]) => `
                                            <div class="bg-gray-50 p-2 rounded border border-gray-200 text-sm font-bold flex items-center gap-2">
                                                <span>${team.logo}</span>
                                                <span class="text-gray-800">${team.name}</span>
                                            </div>
                                        `).join('') : '<p class="text-gray-400 text-xs text-center py-2">No teams added</p>'}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderViewerPanel(groups) {
            const allMatches = [];
            Object.entries(groups).forEach(([gKey, group]) => {
                if (group.matches) {
                    Object.entries(group.matches).forEach(([mKey, match]) => {
                        allMatches.push({ ...match, groupKey: gKey, matchKey: mKey });
                    });
                }
            });

            return `
                <div class="space-y-4">
                    ${allMatches.length === 0 ? `
                        <div class="bg-white p-12 rounded-xl border border-pink-200 text-center shadow-sm">
                            <span class="text-4xl block mb-3">🏟️</span>
                            <h3 class="text-lg font-bold text-gray-800 mb-1">No Matches Yet</h3>
                            <p class="text-gray-500 text-sm">Matches for ${SUBGROUPS[state.activeSubGroup].name} ${SPORTS[state.activeSport].name} will appear here.</p>
                        </div>
                    ` : allMatches.map(match => `
                        <div class="bg-white p-5 rounded-xl border border-pink-200 shadow-sm hover:shadow-md transition">
                            <div class="flex justify-between items-start mb-4 border-b border-gray-100 pb-3">
                                <div class="text-xs text-gray-500 font-medium">
                                    <span class="bg-pink-50 text-pink-700 px-2 py-1 rounded font-bold mr-2">${match.groupKey}</span>
                                    ${match.date ? `📅 ${match.date}` : ''} ${match.time ? `🕐 ${match.time}` : ''} ${match.venue ? `📍 ${match.venue}` : ''}
                                </div>
                                <span class="text-xs font-black tracking-wide px-2 py-1 rounded ${match.status === 'live' ? 'bg-red-100 text-red-600 animate-pulse' : match.status === 'finished' ? 'bg-gray-100 text-gray-500' : 'bg-blue-50 text-blue-600'}">
                                    ${match.status === 'live' ? '● LIVE' : match.status === 'finished' ? 'FULL TIME' : 'UPCOMING'}
                                </span>
                            </div>
                            <div class="flex justify-between items-center px-2">
                                <div class="font-bold text-gray-800 text-lg flex-1 text-right">${match.teamA}</div>
                                <div class="text-4xl font-black text-pink-600 mx-6 tabular-nums">${match.scoreA} - ${match.scoreB}</div>
                                <div class="font-bold text-gray-800 text-lg flex-1 text-left">${match.teamB}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Initialize App
        render();
    </script>
</body>
</html>
