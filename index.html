<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tournament Manager</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#ec4899',
                        brandLight: '#fdf2f8',
                        brandDark: '#be185d'
                    },
                    animation: {
                        'ticker-scroll': 'ticker-scroll 30s linear infinite',
                        'pulse-live': 'pulse-live 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite'
                    },
                    keyframes: {
                        'ticker-scroll': {
                            '0%': { transform: 'translateX(100%)' },
                            '100%': { transform: 'translateX(-100%)' }
                        },
                        'pulse-live': {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0.5' }
                        }
                    }
                }
            }
        }
    </script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { overscroll-behavior-y: none; background-color: #fdf2f8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        input, select, textarea { font-size: 16px !important; }
        
        .ticker-container {
            background: linear-gradient(90deg, #ec4899 0%, #be185d 100%);
            overflow: hidden;
            position: relative;
        }
        .ticker-content {
            display: flex;
            white-space: nowrap;
            animation: ticker-scroll 25s linear infinite;
        }
        .ticker-item {
            padding: 0 60px;
            display: inline-block;
            font-size: 14px;
            font-weight: 600;
            color: white;
            letter-spacing: 0.05em;
        }
        .ticker-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: white;
            margin: 0 20px;
            vertical-align: middle;
        }
        
        .match-card {
            background: white;
            border: 1px solid rgba(236, 72, 153, 0.2);
            box-shadow: 0 2px 8px rgba(236, 72, 153, 0.1);
        }
        .match-card:hover {
            border-color: rgba(236, 72, 153, 0.5);
            box-shadow: 0 4px 16px rgba(236, 72, 153, 0.2);
        }
    </style>
</head>
<body class="text-white min-h-screen">
    <div id="root"></div>
<script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>

<script type="text/babel">
  const firebaseConfig = {
    apiKey: "AIzaSyCupK0XQYDdQB5-C-NqPaI2B6hSd3Twh6I",
    authDomain: "tournament-f7277.firebaseapp.com",
    databaseURL: "https://tournament-f7277-default-rtdb.firebaseio.com",
    projectId: "tournament-f7277",
    storageBucket: "tournament-f7277.firebasestorage.app",
    messagingSenderId: "822786718406",
    appId: "1:822786718406:web:2ba6db5d8a73236a74f5c7"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // Your React code starts here
  const { useState, useEffect, useMemo } = React;
  
  // Paste the rest of your tournament logic below this line...

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const { useState, useEffect, useMemo } = React;

        const SPORTS = {
            football: { name: 'Football', icon: '⚽', color: '#3b82f6' },
            cricket: { name: 'Cricket', icon: '🏏', color: '#f59e0b' },
            badminton: { name: 'Badminton', icon: '🏸', color: '#8b5cf6' },
            basketball: { name: 'Basketball', icon: '🏀', color: '#ef4444' },
            tennis: { name: 'Tennis', icon: '🎾', color: '#10b981' },
            hockey: { name: 'Hockey', icon: '🏑', color: '#06b6d4' }
        };

        function App() {
            const [tournaments, setTournaments] = useState({});
            const [loading, setLoading] = useState(true);
            const [activeSport, setActiveSport] = useState('football');
            const [ticker, setTicker] = useState([]);
            const [showHostPanel, setShowHostPanel] = useState(false);
            
            const isHost = new URLSearchParams(window.location.search).get('host') === 'secret';

            useEffect(() => {
                const tournamentsRef = db.ref('tournaments');
                const tickerRef = db.ref('ticker');

                tournamentsRef.on('value', (snapshot) => {
                    if (snapshot.val()) {
                        setTournaments(snapshot.val());
                    } else {
                        initializeTournaments();
                    }
                    setLoading(false);
                });

                tickerRef.on('value', (snapshot) => {
                    if (snapshot.val()) setTicker(snapshot.val());
                });

                return () => { tournamentsRef.off(); tickerRef.off(); };
            }, []);

            const initializeTournaments = () => {
                const initial = {
                    football: { groups: {} },
                    cricket: { groups: {} },
                    badminton: { groups: {} },
                    basketball: { groups: {} },
                    tennis: { groups: {} },
                    hockey: { groups: {} }
                };
                db.ref('tournaments').set(initial);
            };

            const addGroup = (sport, groupName) => {
                const path = `tournaments/${sport}/groups/${groupName}`;
                db.ref(path).set({ name: groupName, teams: {}, matches: {} });
            };

            const addTeam = (sport, groupName, teamName, logo) => {
                const teamId = Date.now();
                const path = `tournaments/${sport}/groups/${groupName}/teams/${teamId}`;
                db.ref(path).set({ id: teamId, name: teamName, logo: logo || '⚽' });
            };

            const removeTeam = (sport, groupName, teamId) => {
                db.ref(`tournaments/${sport}/groups/${groupName}/teams/${teamId}`).remove();
            };

            const removeGroup = (sport, groupName) => {
                db.ref(`tournaments/${sport}/groups/${groupName}`).remove();
            };

            const addFixture = (sport, groupName, teamA, teamB, date, time, venue) => {
                const fixtureId = Date.now();
                const path = `tournaments/${sport}/groups/${groupName}/matches/${fixtureId}`;
                db.ref(path).set({
                    id: fixtureId, teamA, teamB, date, time, venue,
                    scoreA: 0, scoreB: 0, status: 'upcoming',
                    wickets: 0, runs: 0, overs: '0.0',
                    pointsA: 0, pointsB: 0, setsA: 0, setsB: 0
                });
            };

            const removeFixture = (sport, groupName, fixtureId) => {
                db.ref(`tournaments/${sport}/groups/${groupName}/matches/${fixtureId}`).remove();
            };

            const updateFixture = (sport, groupName, fixtureId, field, value) => {
                db.ref(`tournaments/${sport}/groups/${groupName}/matches/${fixtureId}/${field}`).set(value);
            };

            const addTickerItem = (text) => {
                db.ref(`ticker/${Date.now()}`).set(text);
            };

            const removeTickerItem = (id) => {
                db.ref(`ticker/${id}`).remove();
            };

            if (loading) {
                return (
                    <div className="flex justify-center items-center h-screen">
                        <div className="text-center">
                            <div className="text-5xl mb-4">🎯</div>
                            <p className="font-bold text-brand">Loading...</p>
                        </div>
                    </div>
                );
            }

            const allMatches = useMemo(() => {
                const matches = [];
                const sportData = tournaments[activeSport];
                if (sportData?.groups) {
                    Object.entries(sportData.groups).forEach(([groupKey, group]) => {
                        if (group.matches) {
                            Object.entries(group.matches).forEach(([matchKey, match]) => {
                                matches.push({
                                    ...match,
                                    groupKey,
                                    matchKey,
                                    teamAData: group.teams?.[match.teamA],
                                    teamBData: group.teams?.[match.teamB]
                                });
                            });
                        }
                    });
                }
                return matches.sort((a, b) => {
                    const statusOrder = { live: 0, upcoming: 1, finished: 2 };
                    return statusOrder[a.status] - statusOrder[b.status];
                });
            }, [tournaments, activeSport]);

            return (
                <div className="min-h-screen">
                    {/* TICKER */}
                    {ticker && Object.keys(ticker).length > 0 && (
                        <div className="ticker-container py-2">
                            <div className="ticker-content">
                                {Object.values(ticker).map((item, idx) => (
                                    <span key={idx}>
                                        {idx > 0 && <span className="ticker-dot"></span>}
                                        {item}
                                    </span>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* HEADER */}
                    <header className="bg-white border-b border-pink-100 shadow-sm sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                            <h1 className="text-2xl font-black text-brand">Tournament</h1>
                            {isHost && (
                                <button
                                    onClick={() => setShowHostPanel(!showHostPanel)}
                                    className="px-4 py-2 bg-brand text-white rounded-lg font-bold hover:bg-brandDark transition-colors text-sm"
                                >
                                    {showHostPanel ? '✕ Close' : '⚙️ Host Panel'}
                                </button>
                            )}
                        </div>
                    </header>

                    {/* SPORT TABS */}
                    <div className="bg-white border-b border-pink-100 sticky top-16 z-40">
                        <div className="max-w-7xl mx-auto px-4">
                            <div className="flex gap-2 overflow-x-auto hide-scrollbar py-2">
                                {Object.entries(SPORTS).map(([key, sport]) => (
                                    <button
                                        key={key}
                                        onClick={() => setActiveSport(key)}
                                        className={`px-4 py-2 rounded-full font-bold whitespace-nowrap text-sm transition-all ${
                                            activeSport === key
                                                ? 'bg-brand text-white'
                                                : 'bg-pink-50 text-gray-700 hover:text-brand'
                                        }`}
                                    >
                                        {sport.icon} {sport.name}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* MAIN CONTENT */}
                    <div className="max-w-7xl mx-auto px-4 py-6">
                        {showHostPanel ? (
                            <HostPanel
                                sport={activeSport}
                                tournaments={tournaments}
                                addGroup={addGroup}
                                addTeam={addTeam}
                                removeTeam={removeTeam}
                                removeGroup={removeGroup}
                                addFixture={addFixture}
                                removeFixture={removeFixture}
                                updateFixture={updateFixture}
                                ticker={ticker}
                                addTickerItem={addTickerItem}
                                removeTickerItem={removeTickerItem}
                                isHost={isHost}
                            />
                        ) : (
                            <div className="space-y-4">
                                <div className="flex items-center justify-between mb-6">
                                    <h2 className="text-xl font-black text-brand">{SPORTS[activeSport].icon} {SPORTS[activeSport].name}</h2>
                                    <span className="text-xs text-gray-400">
                                        {allMatches.filter(m => m.status === 'live').length} LIVE
                                    </span>
                                </div>

                                {allMatches.length === 0 ? (
                                    <div className="text-center py-12 text-gray-400">
                                        <p className="text-lg font-semibold">No matches scheduled</p>
                                    </div>
                                ) : (
                                    allMatches.map((match) => (
                                        <MatchCard
                                            key={`${match.groupKey}-${match.matchKey}`}
                                            match={match}
                                            sport={activeSport}
                                            isHost={isHost}
                                            updateFixture={updateFixture}
                                        />
                                    ))
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function MatchCard({ match, sport, isHost, updateFixture }) {
            const getStatusColor = (status) => {
                return status === 'live' ? 'text-red-500' : status === 'finished' ? 'text-gray-400' : 'text-gray-500';
            };

            const getStatusLabel = (status) => {
                if (status === 'live') return '● LIVE';
                if (status === 'finished') return 'FT';
                return match.time || '–';
            };

            return (
                <div className="match-card rounded-lg p-4 transition-all">
                    {/* Header with status, date, venue */}
                    <div className="flex justify-between items-start mb-3">
                        <div className="text-xs text-gray-500 space-y-1">
                            {match.date && <div>📅 {match.date}</div>}
                            {match.venue && <div>📍 {match.venue}</div>}
                        </div>
                        <div className={`font-bold text-sm ${getStatusColor(match.status)}`}>
                            {getStatusLabel(match.status)}
                        </div>
                    </div>

                    {/* Teams and Score */}
                    <div className="space-y-2 mb-4">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-3 flex-1">
                                <span className="text-2xl">{match.teamAData?.logo || '⚽'}</span>
                                <span className="font-semibold text-sm text-gray-800 flex-1 truncate">{match.teamAData?.name || 'Team A'}</span>
                            </div>
                            <div className="text-right min-w-fit">
                                {sport === 'cricket' ? (
                                    <div className="text-2xl font-black text-brand">{match.runs || 0}/{match.wickets || 0}</div>
                                ) : sport === 'badminton' ? (
                                    <div className="text-2xl font-black text-brand">{match.pointsA || 0}</div>
                                ) : (
                                    <div className="text-2xl font-black text-brand">{match.scoreA || 0}</div>
                                )}
                            </div>
                        </div>

                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-3 flex-1">
                                <span className="text-2xl">{match.teamBData?.logo || '⚽'}</span>
                                <span className="font-semibold text-sm text-gray-800 flex-1 truncate">{match.teamBData?.name || 'Team B'}</span>
                            </div>
                            <div className="text-right min-w-fit">
                                {sport === 'cricket' ? (
                                    <div className="text-2xl font-black text-brand">{match.runs || 0}/{match.wickets || 0}</div>
                                ) : sport === 'badminton' ? (
                                    <div className="text-2xl font-black text-brand">{match.pointsB || 0}</div>
                                ) : (
                                    <div className="text-2xl font-black text-brand">{match.scoreB || 0}</div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Cricket specific */}
                    {sport === 'cricket' && (
                        <div className="text-xs text-gray-500 text-center border-t border-pink-100 pt-2">
                            Over: {match.overs || '0.0'} | Target: {match.targetScore || '–'}
                        </div>
                    )}
                </div>
            );
        }

        function HostPanel({ sport, tournaments, addGroup, addTeam, removeTeam, removeGroup, addFixture, removeFixture, updateFixture, ticker, addTickerItem, removeTickerItem, isHost }) {
            const [activeTab, setActiveTab] = useState('matches');
            const [newGroupName, setNewGroupName] = useState('');
            const [selectedGroup, setSelectedGroup] = useState(null);
            const [newTeam, setNewTeam] = useState({ name: '', logo: '⚽' });
            const [newFixture, setNewFixture] = useState({ teamA: '', teamB: '', date: '', time: '', venue: '' });
            const [tickerText, setTickerText] = useState('');

            const sportData = tournaments[sport];
            const groups = sportData?.groups || {};
            const currentGroup = selectedGroup ? groups[selectedGroup] : null;

            return (
                <div className="bg-white rounded-lg border-2 border-pink-100 p-6 shadow-lg">
                    {/* Tabs */}
                    <div className="flex gap-2 mb-6 border-b border-pink-100">
                        {['matches', 'teams', 'ticker'].map((tab) => (
                            <button
                                key={tab}
                                onClick={() => setActiveTab(tab)}
                                className={`px-4 py-2 font-bold text-sm transition-colors ${
                                    activeTab === tab ? 'text-brand border-b-2 border-brand' : 'text-gray-400'
                                }`}
                            >
                                {tab.charAt(0).toUpperCase() + tab.slice(1)}
                            </button>
                        ))}
                    </div>

                    {/* MATCHES TAB */}
                    {activeTab === 'matches' && (
                        <div className="space-y-4">
                            {/* Group selector */}
                            <div className="space-y-2">
                                <label className="text-xs font-bold text-brand uppercase">Select Group</label>
                                <div className="flex gap-2 flex-wrap">
                                    {Object.keys(groups).map((groupKey) => (
                                        <button
                                            key={groupKey}
                                            onClick={() => setSelectedGroup(selectedGroup === groupKey ? null : groupKey)}
                                            className={`px-3 py-1 rounded font-bold text-sm transition-all ${
                                                selectedGroup === groupKey
                                                    ? 'bg-brand text-white'
                                                    : 'bg-pink-50 text-gray-700 hover:text-brand'
                                            }`}
                                        >
                                            {groups[groupKey].name}
                                        </button>
                                    ))}
                                    <button
                                        onClick={() => {
                                            const name = prompt('Group name (e.g., Group A):');
                                            if (name) addGroup(sport, name);
                                        }}
                                        className="px-3 py-1 rounded font-bold text-sm bg-pink-50 text-gray-700 hover:text-brand transition-colors"
                                    >
                                        + New Group
                                    </button>
                                </div>
                            </div>

                            {/* Fixtures for selected group */}
                            {selectedGroup && currentGroup && (
                                <div className="space-y-3 mt-6">
                                    <h3 className="font-bold text-brand">Fixtures in {currentGroup.name}</h3>
                                    {Object.entries(currentGroup.matches || {}).map(([fixtureKey, fixture]) => (
                                        <div key={fixtureKey} className="bg-pink-50 p-3 rounded border border-pink-200 space-y-2">
                                            <div className="flex justify-between items-start">
                                                <div className="text-xs text-gray-600">
                                                    {fixture.date} | {fixture.time} | {fixture.venue}
                                                </div>
                                                <select
                                                    value={fixture.status}
                                                    onChange={(e) => updateFixture(sport, selectedGroup, fixtureKey, 'status', e.target.value)}
                                                    className="text-xs px-2 py-1 bg-white border border-pink-200 rounded text-gray-700 font-bold"
                                                >
                                                    <option value="upcoming">Upcoming</option>
                                                    <option value="live">Live</option>
                                                    <option value="finished">Finished</option>
                                                </select>
                                            </div>
                                            <div className="flex gap-4 items-center justify-between">
                                                <input
                                                    type="number"
                                                    value={fixture.scoreA || 0}
                                                    onChange={(e) => updateFixture(sport, selectedGroup, fixtureKey, 'scoreA', parseInt(e.target.value) || 0)}
                                                    className="w-16 px-2 py-1 bg-white border border-pink-200 rounded text-gray-700 text-sm font-bold text-center"
                                                    placeholder="Score A"
                                                />
                                                <span className="text-gray-500">VS</span>
                                                <input
                                                    type="number"
                                                    value={fixture.scoreB || 0}
                                                    onChange={(e) => updateFixture(sport, selectedGroup, fixtureKey, 'scoreB', parseInt(e.target.value) || 0)}
                                                    className="w-16 px-2 py-1 bg-white border border-pink-200 rounded text-gray-700 text-sm font-bold text-center"
                                                    placeholder="Score B"
                                                />
                                                <button
                                                    onClick={() => removeFixture(sport, selectedGroup, fixtureKey)}
                                                    className="px-3 py-1 bg-red-100 text-red-600 rounded font-bold text-xs hover:bg-red-200"
                                                >
                                                    Remove
                                                </button>
                                            </div>
                                        </div>
                                    ))}

                                    {/* Add new fixture */}
                                    <button
                                        onClick={() => {
                                            if (newFixture.teamA && newFixture.teamB) {
                                                addFixture(sport, selectedGroup, newFixture.teamA, newFixture.teamB, newFixture.date, newFixture.time, newFixture.venue);
                                                setNewFixture({ teamA: '', teamB: '', date: '', time: '', venue: '' });
                                            }
                                        }}
                                        className="w-full py-2 bg-brand text-white rounded font-bold text-sm hover:bg-brandDark transition-colors mt-4"
                                    >
                                        + Add Fixture
                                    </button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* TEAMS TAB */}
                    {activeTab === 'teams' && (
                        <div className="space-y-4">
                            {/* Group selector */}
                            <div className="space-y-2">
                                <label className="text-xs font-bold text-brand uppercase">Select Group</label>
                                <div className="flex gap-2 flex-wrap">
                                    {Object.keys(groups).map((groupKey) => (
                                        <button
                                            key={groupKey}
                                            onClick={() => setSelectedGroup(selectedGroup === groupKey ? null : groupKey)}
                                            className={`px-3 py-1 rounded font-bold text-sm transition-all ${
                                                selectedGroup === groupKey
                                                    ? 'bg-brand text-white'
                                                    : 'bg-pink-50 text-gray-700 hover:text-brand'
                                            }`}
                                        >
                                            {groups[groupKey].name}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {selectedGroup && currentGroup && (
                                <div className="space-y-3">
                                    <h3 className="font-bold text-brand">Teams in {currentGroup.name}</h3>
                                    {Object.entries(currentGroup.teams || {}).map(([teamKey, team]) => (
                                        <div key={teamKey} className="flex items-center justify-between bg-pink-50 p-3 rounded border border-pink-200">
                                            <div className="flex items-center gap-2">
                                                <input
                                                    type="text"
                                                    value={team.logo}
                                                    onChange={(e) => {
                                                        db.ref(`tournaments/${sport}/groups/${selectedGroup}/teams/${teamKey}/logo`).set(e.target.value);
                                                    }}
                                                    maxLength="2"
                                                    className="w-10 px-1 py-1 bg-white border border-pink-200 rounded text-center font-bold text-gray-700"
                                                />
                                                <input
                                                    type="text"
                                                    value={team.name}
                                                    onChange={(e) => {
                                                        db.ref(`tournaments/${sport}/groups/${selectedGroup}/teams/${teamKey}/name`).set(e.target.value);
                                                    }}
                                                    className="flex-1 px-2 py-1 bg-white border border-pink-200 rounded text-sm font-bold text-gray-700"
                                                />
                                            </div>
                                            <button
                                                onClick={() => removeTeam(sport, selectedGroup, teamKey)}
                                                className="px-3 py-1 bg-red-100 text-red-600 rounded font-bold text-xs hover:bg-red-200"
                                            >
                                                Remove
                                            </button>
                                        </div>
                                    ))}

                                    <div className="flex gap-2 mt-4">
                                        <input
                                            type="text"
                                            placeholder="Team name"
                                            value={newTeam.name}
                                            onChange={(e) => setNewTeam({ ...newTeam, name: e.target.value })}
                                            className="flex-1 px-3 py-2 bg-white border border-pink-200 rounded text-sm text-gray-700"
                                        />
                                        <input
                                            type="text"
                                            placeholder="Logo"
                                            value={newTeam.logo}
                                            onChange={(e) => setNewTeam({ ...newTeam, logo: e.target.value })}
                                            maxLength="2"
                                            className="w-16 px-2 py-2 bg-white border border-pink-200 rounded text-center font-bold text-gray-700"
                                        />
                                        <button
                                            onClick={() => {
                                                addTeam(sport, selectedGroup, newTeam.name, newTeam.logo);
                                                setNewTeam({ name: '', logo: '⚽' });
                                            }}
                                            className="px-4 py-2 bg-brand text-white rounded font-bold hover:bg-brandDark transition-colors"
                                        >
                                            Add
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* TICKER TAB */}
                    {activeTab === 'ticker' && (
                        <div className="space-y-4">
                            <div className="flex gap-2">
                                <input
                                    type="text"
                                    placeholder="Add headline..."
                                    value={tickerText}
                                    onChange={(e) => setTickerText(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && (addTickerItem(tickerText), setTickerText(''))}
                                    className="flex-1 px-4 py-2 bg-white border border-pink-200 rounded text-gray-700 placeholder-gray-400"
                                />
                                <button
                                    onClick={() => {
                                        addTickerItem(tickerText);
                                        setTickerText('');
                                    }}
                                    className="px-4 py-2 bg-brand text-white rounded font-bold hover:bg-brandDark transition-colors"
                                >
                                    Add
                                </button>
                            </div>
                            <div className="space-y-2">
                                {ticker && Object.entries(ticker).map(([id, text]) => (
                                    <div key={id} className="flex items-center justify-between bg-pink-50 p-3 rounded border border-pink-200">
                                        <span className="text-sm text-gray-700">{text}</span>
                                        <button
                                            onClick={() => removeTickerItem(id)}
                                            className="px-2 py-1 bg-red-100 text-red-600 rounded font-bold text-xs hover:bg-red-200"
                                        >
                                            ✕
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
