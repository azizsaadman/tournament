<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        .sport-btn.active { @apply bg-pink-600 text-white; }
        .sport-btn:not(.active) { @apply bg-pink-100 text-gray-700; }
    </style>
</head>
<body class="bg-pink-50 text-gray-900">
    <div id="app"></div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCupK0XQYDdQB5-C-NqPaI2B6hSd3Twh6I",
            authDomain: "tournament-f7277.firebaseapp.com",
            databaseURL: "https://tournament-f7277-default-rtdb.firebaseio.com",
            projectId: "tournament-f7277",
            storageBucket: "tournament-f7277.firebasestorage.app",
            messagingSenderId: "822786718406",
            appId: "1:822786718406:web:2ba6db5d8a73236a74f5c7"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let state = {
            activeSport: 'football',
            showHost: false,
            tournaments: {},
            isHost: new URLSearchParams(window.location.search).get('host') === 'secret'
        };

        const SPORTS = {
            football: { name: 'Football', icon: '⚽' },
            cricket: { name: 'Cricket', icon: '🏏' },
            badminton: { name: 'Badminton', icon: '🏸' },
            basketball: { name: 'Basketball', icon: '🏀' },
            tennis: { name: 'Tennis', icon: '🎾' },
            hockey: { name: 'Hockey', icon: '🏑' }
        };

        // Firebase listeners
        db.ref('tournaments').on('value', (snapshot) => {
            state.tournaments = snapshot.val() || {};
            render();
        });

        // Functions
        function selectSport(sport) {
            state.activeSport = sport;
            render();
        }

        function toggleHost() {
            state.showHost = !state.showHost;
            render();
        }

        function addGroup() {
            const name = prompt('Group name (e.g., Group A):');
            if (name) {
                db.ref(`tournaments/${state.activeSport}/groups/${name}`).set({
                    teams: {},
                    matches: {}
                });
            }
        }

        function addTeam(groupName) {
            const teamName = prompt('Team name:');
            if (!teamName) return;
            const teamId = Date.now();
            db.ref(`tournaments/${state.activeSport}/groups/${groupName}/teams/${teamId}`).set({
                id: teamId,
                name: teamName,
                logo: '⚽'
            });
        }

        function addMatch(groupName) {
            const teamA = prompt('Team A name:');
            if (!teamA) return;
            const teamB = prompt('Team B name:');
            if (!teamB) return;
            const date = prompt('Date (e.g., 2024-05-15):');
            const time = prompt('Time (e.g., 3:00 PM):');
            const venue = prompt('Venue:');

            const matchId = Date.now();
            db.ref(`tournaments/${state.activeSport}/groups/${groupName}/matches/${matchId}`).set({
                id: matchId,
                teamA,
                teamB,
                scoreA: 0,
                scoreB: 0,
                status: 'upcoming',
                date,
                time,
                venue
            });
        }

        function updateScore(groupName, matchId, team, value) {
            const field = team === 'A' ? 'scoreA' : 'scoreB';
            db.ref(`tournaments/${state.activeSport}/groups/${groupName}/matches/${matchId}/${field}`).set(parseInt(value));
        }

        function updateStatus(groupName, matchId, status) {
            db.ref(`tournaments/${state.activeSport}/groups/${groupName}/matches/${matchId}/status`).set(status);
        }

        function removeMatch(groupName, matchId) {
            if (confirm('Delete this match?')) {
                db.ref(`tournaments/${state.activeSport}/groups/${groupName}/matches/${matchId}`).remove();
            }
        }

        function removeGroup(groupName) {
            if (confirm('Delete this group?')) {
                db.ref(`tournaments/${state.activeSport}/groups/${groupName}`).remove();
            }
        }

        function addTickerItem() {
            const text = prompt('Enter headline:');
            if (text) {
                db.ref(`ticker/${Date.now()}`).set(text);
            }
        }

        // Render function
        function render() {
            const app = document.getElementById('app');
            const sportData = state.tournaments[state.activeSport] || {};
            const groups = sportData.groups || {};

            app.innerHTML = `
                <div class="min-h-screen bg-pink-50">
                    <!-- Header -->
                    <header class="bg-white border-b border-pink-200 sticky top-0 z-50">
                        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                            <h1 class="text-3xl font-black text-pink-600">🎯 Tournament Manager</h1>
                            ${state.isHost ? `<button onclick="toggleHost()" class="px-4 py-2 bg-pink-600 text-white rounded-lg font-bold">${state.showHost ? '✕ Close' : '⚙️ Host'}</button>` : ''}
                        </div>
                    </header>

                    <!-- Sport Tabs -->
                    <div class="bg-white border-b border-pink-200 sticky top-16 z-40">
                        <div class="max-w-7xl mx-auto px-4 py-3">
                            <div class="flex gap-2 overflow-x-auto pb-2">
                                ${Object.entries(SPORTS).map(([key, sport]) => `
                                    <button onclick="selectSport('${key}')" class="sport-btn ${state.activeSport === key ? 'active' : ''} px-4 py-2 rounded-full font-bold whitespace-nowrap text-sm">
                                        ${sport.icon} ${sport.name}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <!-- Content -->
                    <div class="max-w-7xl mx-auto px-4 py-6">
                        ${state.showHost && state.isHost ? renderHostPanel(groups) : renderViewerPanel(groups)}
                    </div>
                </div>
            `;
        }

        function renderHostPanel(groups) {
            return `
                <div class="bg-white rounded-lg border-2 border-pink-200 p-6 shadow-lg">
                    <h2 class="text-2xl font-bold text-pink-600 mb-6">Host Control Panel</h2>
                    
                    <button onclick="addGroup()" class="w-full py-3 bg-pink-600 text-white rounded-lg font-bold mb-6 hover:bg-pink-700">
                        + Add Group
                    </button>

                    <div class="space-y-4">
                        ${Object.entries(groups).length === 0 ? `
                            <p class="text-center text-gray-400 py-8">No groups yet. Click "Add Group" to start!</p>
                        ` : Object.entries(groups).map(([groupKey, group]) => `
                            <div class="bg-pink-50 p-4 rounded-lg border border-pink-200">
                                <div class="flex justify-between items-center mb-3">
                                    <h3 class="text-lg font-bold text-gray-800">${groupKey}</h3>
                                    <button onclick="removeGroup('${groupKey}')" class="px-2 py-1 bg-red-500 text-white rounded text-xs font-bold">Delete</button>
                                </div>

                                <div class="grid grid-cols-2 gap-4">
                                    <!-- Matches Section -->
                                    <div>
                                        <h4 class="font-bold text-sm text-gray-700 mb-2">Matches</h4>
                                        <button onclick="addMatch('${groupKey}')" class="w-full py-2 bg-pink-600 text-white rounded text-sm font-bold mb-2">
                                            + Add Match
                                        </button>
                                        ${group.matches && Object.entries(group.matches).length > 0 ? Object.entries(group.matches).map(([mId, match]) => `
                                            <div class="bg-white p-2 rounded border border-pink-100 mb-2 text-xs">
                                                <div class="font-bold">${match.teamA} vs ${match.teamB}</div>
                                                <div class="flex gap-2 mt-1">
                                                    <input type="number" value="${match.scoreA}" onchange="updateScore('${groupKey}', '${mId}', 'A', this.value)" class="w-10 px-1 py-1 border border-pink-200 rounded text-center">
                                                    <span>-</span>
                                                    <input type="number" value="${match.scoreB}" onchange="updateScore('${groupKey}', '${mId}', 'B', this.value)" class="w-10 px-1 py-1 border border-pink-200 rounded text-center">
                                                    <select onchange="updateStatus('${groupKey}', '${mId}', this.value)" class="flex-1 px-1 py-1 border border-pink-200 rounded text-xs">
                                                        <option value="upcoming" ${match.status === 'upcoming' ? 'selected' : ''}>Upcoming</option>
                                                        <option value="live" ${match.status === 'live' ? 'selected' : ''}>Live</option>
                                                        <option value="finished" ${match.status === 'finished' ? 'selected' : ''}>Finished</option>
                                                    </select>
                                                    <button onclick="removeMatch('${groupKey}', '${mId}')" class="px-1 py-1 bg-red-400 text-white rounded text-xs">✕</button>
                                                </div>
                                            </div>
                                        `).join('') : '<p class="text-gray-400 text-xs">No matches</p>'}
                                    </div>

                                    <!-- Teams Section -->
                                    <div>
                                        <h4 class="font-bold text-sm text-gray-700 mb-2">Teams</h4>
                                        <button onclick="addTeam('${groupKey}')" class="w-full py-2 bg-pink-600 text-white rounded text-sm font-bold mb-2">
                                            + Add Team
                                        </button>
                                        ${group.teams && Object.entries(group.teams).length > 0 ? Object.entries(group.teams).map(([tId, team]) => `
                                            <div class="bg-white p-2 rounded border border-pink-100 mb-2 text-xs">
                                                <div class="font-bold">${team.logo} ${team.name}</div>
                                            </div>
                                        `).join('') : '<p class="text-gray-400 text-xs">No teams</p>'}
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <hr class="my-6 border-pink-200">

                    <h3 class="text-lg font-bold text-gray-800 mb-3">Ticker Headlines</h3>
                    <button onclick="addTickerItem()" class="w-full py-2 bg-pink-600 text-white rounded-lg font-bold">
                        + Add Headline
                    </button>
                </div>
            `;
        }

        function renderViewerPanel(groups) {
            const allMatches = [];
            Object.entries(groups).forEach(([gKey, group]) => {
                if (group.matches) {
                    Object.entries(group.matches).forEach(([mKey, match]) => {
                        allMatches.push({ ...match, groupKey: gKey, matchKey: mKey });
                    });
                }
            });

            return `
                <div class="space-y-4">
                    ${allMatches.length === 0 ? `
                        <div class="bg-white p-8 rounded-lg border border-pink-200 text-center">
                            <p class="text-gray-400 text-lg">No matches yet</p>
                        </div>
                    ` : allMatches.map(match => `
                        <div class="bg-white p-4 rounded-lg border border-pink-200 shadow-sm hover:shadow-md transition">
                            <div class="flex justify-between items-start mb-3">
                                <div class="text-sm text-gray-600">
                                    ${match.date ? `📅 ${match.date}` : ''} ${match.time ? `🕐 ${match.time}` : ''} ${match.venue ? `📍 ${match.venue}` : ''}
                                </div>
                                <span class="text-xs font-bold ${match.status === 'live' ? 'text-red-600' : match.status === 'finished' ? 'text-gray-400' : 'text-gray-500'}">
                                    ${match.status === 'live' ? '● LIVE' : match.status === 'finished' ? 'FT' : 'UPCOMING'}
                                </span>
                            </div>
                            <div class="flex justify-between items-center">
                                <div class="font-semibold">${match.teamA}</div>
                                <div class="text-3xl font-black text-pink-600">${match.scoreA} - ${match.scoreB}</div>
                                <div class="font-semibold">${match.teamB}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Initial render
        render();
    </script>
</body>
</html>
